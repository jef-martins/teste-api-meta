<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bot Admin - Transições</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <h1>Bot Admin</h1>
  </header>

  <div class="tabs">
    <a href="/telas/estados/index.html" class="tab" style="text-decoration:none">📁 Estados</a>
    <a href="/telas/transicoes/tabela/index.html" class="tab active" style="text-decoration:none">🔀 Transições</a>
  </div>

  <div id="banner-modo" style="display:none; background:rgba(210,153,34,0.12); border:1px solid rgba(210,153,34,0.35); border-radius:8px; padding:10px 16px; margin:12px 16px 0; color:#d2991a; font-size:13px; align-items:center; gap:10px; line-height:1.5;"></div>

  <div class="page active">
    <!-- ═══════════════════════ ABA TRANSIÇÕES ═══════════════════════ -->
    <div class="section-header">
      <h2>Transições de Estado</h2>
      <div style="display:flex; gap:10px;">
        <div style="display:flex; background:var(--surface2); padding:4px; border-radius:8px; border:1px solid var(--border);">
           <a href="/telas/transicoes/tabela/index.html" class="btn btn-primary btn-sm" style="border:none; text-decoration:none">📋 Tabela</a>
           <a href="/telas/transicoes/visual_flow/index.html" class="btn btn-ghost btn-sm" style="border:none; text-decoration:none">🗺️ Visual (Flow)</a>
        </div>
        <button class="btn btn-success" id="btn-nova-transicao" onclick="adicionarLinhaTransicao()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova
        </button>
      </div>
    </div>

    <div id="view-table">
      <table id="tbl-transicoes" class="trans-table">
        <thead><tr>
          <th>Origem</th><th>Entrada</th><th>Destino</th><th>Status</th><th style="width:110px">Ações</th>
        </tr></thead>
        <tbody id="body-transicoes">
          <tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="toast">Sucesso!</div>
  <script src="script.js"></script>
</body>
</html>
