<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Admin — Painel de Estados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --surface2: #21262d;
    --border:   #30363d;
    --accent:   #238636;
    --accent2:  #1f6feb;
    --danger:   #da3633;
    --warn:     #d29922;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --radius:   10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── Layout ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  header svg { width: 28px; height: 28px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { color: var(--muted); font-size: 13px; margin-left: auto; }

  .tabs { display: flex; gap: 4px; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; }
  .tab { padding: 12px 18px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); font-weight: 500; font-size: 13px; transition: all .2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent2); border-color: var(--accent2); }

  .page { display: none; padding: 28px; max-width: 1200px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── Cards & Section ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-header h2 { font-size: 16px; font-weight: 600; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; transition: all .15s; }
  .btn-primary   { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .btn-success   { background: var(--accent);  color: #fff; border-color: var(--accent);  }
  .btn-danger    { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-ghost     { background: transparent; color: var(--muted); }
  .btn:hover     { opacity: .85; }
  .btn-sm        { padding: 4px 10px; font-size: 12px; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  thead { background: var(--surface2); }
  th { text-align: left; padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green  { background: rgba(35,134,54,.2);  color: #3fb950; }
  .badge-gray   { background: rgba(139,148,158,.15); color: var(--muted); }
  .badge-blue   { background: rgba(31,111,235,.2);  color: #58a6ff; }
  .badge-yellow { background: rgba(210,153,34,.2);  color: #e3b341; }

  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--surface2); padding: 2px 6px; border-radius: 4px; color: #79c0ff; }

  /* ── Modal ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; }
  .overlay.open { display: flex; animation: fadeIn .15s; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 680px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  .modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 22px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  /* ── Form ── */
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 13px;
    transition: border-color .2s; outline: none;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent2); }
  .form-row textarea { min-height: 140px; resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  select option { background: var(--surface2); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:600px) { .form-grid { grid-template-columns: 1fr; } }

  /* ── Config builder ── */
  .config-builder { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .config-field { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .config-field input { flex: 1; }
  .config-field input.key { flex: 0 0 140px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #79c0ff; }
  .config-field .type-sel { flex: 0 0 90px; font-size: 12px; }
  .json-preview { margin-top: 12px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #a5d6ff; white-space: pre-wrap; word-break: break-all; max-height: 240px; overflow-y: auto; }

  .add-field-btn { width: 100%; text-align: center; padding: 8px; border: 1px dashed var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; margin-top: 4px; font-size: 12px; }
  .add-field-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #3fb950; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { background: var(--danger); }

  /* ── Transições inline ── */
  .trans-table input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 5px; font-size: 12px; width: 100%; font-family: 'JetBrains Mono', monospace; }
  .new-row td { background: rgba(31,111,235,.05); }
</style>
</head>
<body>

<header>
  <svg viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.8">
    <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
  </svg>
  <h1>Bot Admin</h1>
  <span id="status-label">carregando...</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('estados')">🗂 Estados</div>
  <div class="tab" onclick="switchTab('transicoes')">🔀 Transições</div>
</div>

<!-- ═══════════════════════ ABA ESTADOS ═══════════════════════ -->
<div id="tab-estados" class="page active">
  <div class="section-header">
    <h2>Estados do Bot</h2>
    <button class="btn btn-success" onclick="abrirNovoEstado()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo Estado
    </button>
  </div>
  <table id="tbl-estados" style="margin-bottom:40px">
    <thead><tr>
      <th>Estado</th><th>Handler</th><th>Descrição</th><th>Status</th><th>Config</th><th style="width:130px"></th>
    </tr></thead>
    <tbody id="body-estados"><tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Carregando...</td></tr></tbody>
  </table>
</div>

<!-- ═══════════════════════ ABA TRANSIÇÕES ═══════════════════════ -->
<div id="tab-transicoes" class="page">
  <div class="section-header">
    <h2>Transições de Estado</h2>
    <button class="btn btn-success" onclick="adicionarLinhaTransicao()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nova Transição
    </button>
  </div>
  <table id="tbl-transicoes" class="trans-table">
    <thead><tr>
      <th>Origem</th><th>Entrada</th><th>Destino</th><th>Status</th><th style="width:110px"></th>
    </tr></thead>
    <tbody id="body-transicoes"><tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px">Carregando...</td></tr></tbody>
  </table>
</div>

<!-- ═══════════════════════ MODAL ESTADO ═══════════════════════ -->
<div class="overlay" id="modal-estado">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-titulo">Novo Estado</h3>
      <button class="btn btn-ghost btn-sm" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-key">
      <div class="form-grid">
        <div class="form-row">
          <label>Nome do Estado *</label>
          <input id="f-estado" placeholder="Ex: MENU" style="text-transform:uppercase">
        </div>
        <div class="form-row">
          <label>Handler *</label>
          <select id="f-handler" onchange="renderConfigBuilder()">
            <option value="_handlerMensagem">_handlerMensagem</option>
            <option value="_handlerCapturar">_handlerCapturar</option>
            <option value="_handlerRequisicao">_handlerRequisicao</option>
            <option value="_handlerLista">_handlerLista</option>
            <option value="_handlerBotoes">_handlerBotoes</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Descrição</label>
        <input id="f-descricao" placeholder="Descrição legível do estado...">
      </div>

      <!-- Config Builder dinâmico -->
      <div class="form-row">
        <label>Configurações (config JSON)</label>
        <div class="config-builder">
          <div id="config-fields"></div>
          <div class="add-field-btn" onclick="adicionarCampoConfig()">+ Adicionar campo</div>
          <div class="json-preview" id="json-preview">{}</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <label style="margin-right:auto;display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="f-ativo" checked> Ativo
      </label>
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-success" onclick="salvarEstado()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:3000/admin';
let estadosCache = [];

// ── Handlers predefinidos com campos padrão ──────────────────────────────────
const HANDLER_DEFAULTS = {
  _handlerMensagem:   [['mensagens','array','["Olá! Como posso ajudar?"]'],['transicaoAutomatica','bool','false']],
  _handlerCapturar:   [['mensagemPedir','string',''],['mensagemInvalida','string',''],['campoSalvar','string',''],['transicaoAutomatica','bool','false']],
  _handlerRequisicao: [['url','string',''],['metodo','string','GET'],['campoResposta','string',''],['mensagemPedir','string',''],['mensagemSucesso','string',''],['mensagemNaoEncontrado','string',''],['mensagemErro','string',''],['transicaoAutomatica','bool','false']],
  _handlerLista:      [['titulo','string',''],['botaoTexto','string','Selecione:'],['secaoTitulo','string','Opções'],['opcoes','json','[]'],['mensagemInvalida','string','']],
  _handlerBotoes:     [['titulo','string',''],['botoes','json','[]']],
};

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

// ── Fetch helper ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
}

// ══════════════════════════════ ESTADOS ══════════════════════════════════════

async function carregarEstados() {
  const dados = await api('GET', '/estados');
  estadosCache = dados;
  const tb = document.getElementById('body-estados');
  document.getElementById('status-label').textContent = `${dados.length} estados carregados`;

  if (!dados.length) { tb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Nenhum estado encontrado.</td></tr>'; return; }

  tb.innerHTML = dados.map(e => `
    <tr>
      <td><code>${e.estado}</code></td>
      <td><span class="badge badge-blue">${e.handler}</span></td>
      <td style="color:var(--muted)">${e.descricao || '—'}</td>
      <td><span class="badge ${e.ativo ? 'badge-green' : 'badge-gray'}">${e.ativo ? 'Ativo' : 'Inativo'}</span></td>
      <td><code style="font-size:11px;color:var(--muted)">${JSON.stringify(e.config).substring(0,50)}…</code></td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick='editarEstado(${JSON.stringify(e)})'>✏️ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="excluirEstado('${e.estado}')">🗑</button>
      </td>
    </tr>`).join('');
}

function abrirNovoEstado() {
  document.getElementById('edit-key').value = '';
  document.getElementById('f-estado').value = '';
  document.getElementById('f-estado').disabled = false;
  document.getElementById('f-handler').value = '_handlerMensagem';
  document.getElementById('f-descricao').value = '';
  document.getElementById('f-ativo').checked = true;
  document.getElementById('modal-titulo').textContent = 'Novo Estado';
  renderConfigBuilder({});
  document.getElementById('modal-estado').classList.add('open');
}

function editarEstado(e) {
  document.getElementById('edit-key').value = e.estado;
  document.getElementById('f-estado').value = e.estado;
  document.getElementById('f-estado').disabled = true;
  document.getElementById('f-handler').value = e.handler;
  document.getElementById('f-descricao').value = e.descricao || '';
  document.getElementById('f-ativo').checked = e.ativo;
  document.getElementById('modal-titulo').textContent = 'Editar: ' + e.estado;
  renderConfigBuilder(e.config || {});
  document.getElementById('modal-estado').classList.add('open');
}

function fecharModal() {
  document.getElementById('modal-estado').classList.remove('open');
}

async function salvarEstado() {
  const key     = document.getElementById('edit-key').value;
  const estado  = document.getElementById('f-estado').value.trim().toUpperCase();
  const handler = document.getElementById('f-handler').value;
  const descricao = document.getElementById('f-descricao').value.trim();
  const ativo   = document.getElementById('f-ativo').checked;
  const config  = coletarConfig();

  if (!estado) return toast('O nome do estado é obrigatório.', true);

  const body = { handler, descricao, config, ativo };
  const r = key
    ? await api('PUT', '/estados/' + key, body)
    : await api('POST', '/estados', { ...body, estado });

  if (r.erro) return toast(r.erro, true);
  toast(key ? 'Estado atualizado!' : 'Estado criado!');
  fecharModal();
  carregarEstados();
}

async function excluirEstado(estado) {
  if (!confirm(`Excluir o estado "${estado}"? As transições vinculadas serão removidas.`)) return;
  const r = await api('DELETE', '/estados/' + estado);
  if (r.erro) return toast(r.erro, true);
  toast('Estado excluído.');
  carregarEstados();
  carregarTransicoes();
}

// ══════════════════════════════ CONFIG BUILDER ════════════════════════════════

function renderConfigBuilder(configAtual) {
  const handler  = document.getElementById('f-handler').value;
  const defaults = HANDLER_DEFAULTS[handler] || [];
  const container = document.getElementById('config-fields');
  container.innerHTML = '';

  // Campos padrão do handler
  for (const [key, type, def] of defaults) {
    const val = configAtual?.[key] !== undefined ? configAtual[key] : (type === 'bool' ? false : (type === 'array' || type === 'json' ? JSON.stringify(configAtual?.[key] ?? JSON.parse(def)) : def));
    adicionarCampoConfig(key, type, typeof val === 'object' ? JSON.stringify(val) : String(val));
  }

  // Campos extras que existem no config mas não estão no padrão
  if (configAtual) {
    const padKeys = defaults.map(d => d[0]);
    for (const [k, v] of Object.entries(configAtual)) {
      if (!padKeys.includes(k)) {
        const t = typeof v === 'boolean' ? 'bool' : (Array.isArray(v) || typeof v === 'object') ? 'json' : 'string';
        adicionarCampoConfig(k, t, typeof v === 'object' ? JSON.stringify(v) : String(v));
      }
    }
  }

  atualizarPreview();
}

function adicionarCampoConfig(chave = '', tipo = 'string', valor = '') {
  const div = document.createElement('div');
  div.className = 'config-field';
  div.innerHTML = `
    <input class="key" placeholder="chave" value="${chave}" oninput="atualizarPreview()">
    <select class="type-sel" onchange="atualizarPreview()">
      <option value="string"  ${tipo==='string'?'selected':''}>string</option>
      <option value="bool"    ${tipo==='bool'?'selected':''}>bool</option>
      <option value="number"  ${tipo==='number'?'selected':''}>number</option>
      <option value="array"   ${tipo==='array'?'selected':''}>array</option>
      <option value="json"    ${tipo==='json'?'selected':''}>json</option>
    </select>
    <input placeholder="valor" value="${escapeHtml(String(valor))}" oninput="atualizarPreview()" style="flex:1">
    <button class="btn btn-ghost btn-sm" onclick="this.parentElement.remove();atualizarPreview()" title="Remover">✕</button>`;
  document.getElementById('config-fields').appendChild(div);
}

function coletarConfig() {
  const obj = {};
  document.querySelectorAll('#config-fields .config-field').forEach(row => {
    const [kEl, tEl, vEl] = row.querySelectorAll('input, select');
    const k = kEl.value.trim(); if (!k) return;
    const t = tEl.value;
    const v = vEl.value;
    try {
      if      (t === 'bool')   obj[k] = v === 'true';
      else if (t === 'number') obj[k] = Number(v);
      else if (t === 'array' || t === 'json') obj[k] = JSON.parse(v);
      else                     obj[k] = v;
    } catch { obj[k] = v; }
  });
  return obj;
}

function atualizarPreview() {
  document.getElementById('json-preview').textContent = JSON.stringify(coletarConfig(), null, 2);
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════ TRANSIÇÕES ════════════════════════════════════

async function carregarTransicoes() {
  const dados = await api('GET', '/transicoes');
  const tb = document.getElementById('body-transicoes');

  if (!dados.length) { tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px">Nenhuma transição cadastrada.</td></tr>'; return; }

  tb.innerHTML = dados.map(t => `
    <tr id="tr-${t.id}">
      <td><code>${t.estado_origem}</code></td>
      <td><code style="color:#ffa657">${t.entrada}</code></td>
      <td><code>${t.estado_destino}</code></td>
      <td><span class="badge ${t.ativo ? 'badge-green' : 'badge-gray'}">${t.ativo ? 'Ativo' : 'Inativo'}</span></td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick='editarTransicao(${JSON.stringify(t)})'>✏️</button>
        <button class="btn btn-danger btn-sm" onclick="excluirTransicao(${t.id})">🗑</button>
      </td>
    </tr>`).join('');
}

function adicionarLinhaTransicao() {
  const tb = document.getElementById('body-transicoes');
  const tr = document.createElement('tr');
  tr.className = 'new-row';
  tr.id = 'new-tr';
  tr.innerHTML = `
    <td><input id="nt-origem"  placeholder="ESTADO_ORIGEM"  list="lista-estados"></td>
    <td><input id="nt-entrada" placeholder="* ou 1 ou sair"></td>
    <td><input id="nt-destino" placeholder="ESTADO_DESTINO" list="lista-estados"></td>
    <td><span class="badge badge-blue">Nova</span></td>
    <td>
      <button class="btn btn-success btn-sm" onclick="salvarNovaTransicao()">✓</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('new-tr')?.remove()">✕</button>
    </td>`;
  tb.prepend(tr);

  // datalist de estados
  let dl = document.getElementById('lista-estados');
  if (!dl) { dl = document.createElement('datalist'); dl.id = 'lista-estados'; document.body.appendChild(dl); }
  dl.innerHTML = estadosCache.map(e => `<option value="${e.estado}">`).join('');
  document.getElementById('nt-origem').focus();
}

async function salvarNovaTransicao() {
  const origem  = document.getElementById('nt-origem')?.value.trim().toUpperCase();
  const entrada = document.getElementById('nt-entrada')?.value.trim().toLowerCase();
  const destino = document.getElementById('nt-destino')?.value.trim().toUpperCase();
  if (!origem || !entrada || !destino) return toast('Preencha todos os campos.', true);
  const r = await api('POST', '/transicoes', { estado_origem: origem, entrada, estado_destino: destino });
  if (r.erro) return toast(r.erro, true);
  toast('Transição criada!');
  carregarTransicoes();
}

function editarTransicao(t) {
  const tr = document.getElementById('tr-' + t.id);
  tr.innerHTML = `
    <td><input value="${t.estado_origem}"  list="lista-estados" id="et-origem-${t.id}"></td>
    <td><input value="${t.entrada}"        id="et-entrada-${t.id}"></td>
    <td><input value="${t.estado_destino}" list="lista-estados" id="et-destino-${t.id}"></td>
    <td><span class="badge badge-yellow">Editando</span></td>
    <td>
      <button class="btn btn-success btn-sm" onclick="salvarEdicaoTransicao(${t.id},${t.ativo})">✓</button>
      <button class="btn btn-ghost btn-sm" onclick="carregarTransicoes()">✕</button>
    </td>`;
}

async function salvarEdicaoTransicao(id, ativo) {
  const r = await api('PUT', '/transicoes/' + id, {
    estado_origem:  document.getElementById('et-origem-'+id).value.trim().toUpperCase(),
    entrada:        document.getElementById('et-entrada-'+id).value.trim().toLowerCase(),
    estado_destino: document.getElementById('et-destino-'+id).value.trim().toUpperCase(),
    ativo,
  });
  if (r.erro) return toast(r.erro, true);
  toast('Transição atualizada!');
  carregarTransicoes();
}

async function excluirTransicao(id) {
  if (!confirm('Excluir esta transição?')) return;
  const r = await api('DELETE', '/transicoes/' + id);
  if (r.erro) return toast(r.erro, true);
  toast('Transição excluída.');
  carregarTransicoes();
}

// Fechar modal clicando fora
document.getElementById('modal-estado').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharModal();
});

// input uppercase automático
document.getElementById('f-estado').addEventListener('input', e => e.target.value = e.target.value.toUpperCase());

// ── Inicialização ────────────────────────────────────────────────────────────
carregarEstados();
carregarTransicoes();
</script>
</body>
</html>
